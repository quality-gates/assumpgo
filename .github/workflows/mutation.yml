name: Mutation Testing

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  mutation:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Install mutago
        run: go install github.com/quality-gates/mutago/v2/cmd/mutago@latest

      - name: Run mutation testing
        # Scoped to the core analysis package. The cmd/ package is excluded
        # because its only meaningful behaviour is re-invoking the binary, which
        # is integration- rather than unit-tested.
        # --coverage generates a profile before mutation to compute covered-code
        # MSI and marks mutants in untested code as "not covered" rather than
        # running them. --min-msi and --min-covered-msi enforce the same quality
        # gates mutago holds itself to.
        run: |
          "$(go env GOPATH)/bin/mutago" \
            --exec-timeout 30 \
            --coverage \
            --min-msi 75 \
            --min-covered-msi 80 \
            --logger-github \
            github.com/quality-gates/assumpgo
